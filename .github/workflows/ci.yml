name: Python CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest-cov bandit

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          # --exclude=apps/ ensures modular apps are not scanned (they have their own CI)
          flake8 . --count --exclude=apps/ --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exclude=apps/ --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check formatting with black
        run: |
          # --extend-exclude uses regex to skip apps/ directory
          black --check . --extend-exclude "apps"

      - name: Security check with Bandit
        run: |
          # Check for high-severity security issues in src/
          bandit -r src/ -ll

      - name: Test Core with pytest
        run: |
          # --ignore=apps/ skips test discovery in modular apps
          pytest --ignore=apps/ --cov=src --cov-report=xml:coverage-core.xml

      - name: Upload Core coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-core.xml
          flags: core
          name: codecov-core
          fail_ci_if_error: true

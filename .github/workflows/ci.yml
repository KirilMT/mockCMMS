name: Python CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        # --exclude=apps/ ensures modular apps are not scanned (they have their own CI)
        flake8 . --count --exclude=apps/ --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exclude=apps/ --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: |
        # --extend-exclude uses regex to skip apps/ directory
        black --check . --extend-exclude "apps"

    - name: Test with pytest and generate coverage
      run: |
        # Run tests from tests/backend/ - the new organized structure
        pytest tests/backend/ --ignore=apps/ --cov=src --cov-report=xml --cov-fail-under=80

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false  # Don't fail if Codecov is unavailable

---
name: CI Pipeline

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check import sorting with isort
        run: |
          # Check PEP 8 import organization
          isort src apps tests scripts run.py conftest.py \
            --check-only

      - name: Check code formatting with black
        run: |
          # Check Black code formatting
          black --check src apps tests scripts run.py conftest.py

      - name: Check docstring formatting with docformatter
        run: |
          # Check PEP 257 docstring standards
          docformatter --check -r src apps tests scripts run.py conftest.py

      - name: Check documentation formatting with prettier
        run: |
          # Verify documentation formatting (mirrors validate_code.py)
          npx prettier --check "docs/**/*.md" "*.md" "apps/**/*.md" \
            "*.json" ".github/**/*.md" "tests/**/*.md" ".agents/**/*.md"

      - name: Check Jinja2 templates with djlint
        run: |
          # Check Jinja2 template formatting and linting
          # Using soft failure (just warning) for initial rollout
          djlint --check src/templates apps/*/src/templates || \
            echo "::warning::djlint found formatting issues"

      - name: Lint with ruff
        run: |
          # Fast, modern linting (catches more than flake8)
          ruff check src apps tests scripts run.py conftest.py

      - name: Lint with flake8
        run: >-
          flake8 .
          --count
          --exclude=.venv,node_modules,__pycache__,.git,.pytest_cache,htmlcov,playwright-report
          --show-source
          --statistics

      - name: Type check with mypy
        run: |
          # Static type analysis (uses pyproject.toml config)
          mypy

      - name: Security scan with bandit
        run: |
          # Detect security vulnerabilities in ALL Python sources.
          # -r recurses dirs; root .py files listed explicitly.
          bandit -r src/ apps/ scripts/ \
            run.py conftest.py -ll

      - name: Test with pytest and generate comprehensive coverage
        run: |
          # Run ALL tests with comprehensive coverage scope.
          # Measures ALL Python sources so Step 10 (total ≥85%) and
          # diff-cover can validate coverage for any changed file.
          pytest \
            --cov=src \
            --cov=apps \
            --cov=scripts \
            --cov=run.py \
            --cov=conftest.py \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Verify total coverage threshold (>= 85%)
        run: |
          # Check total coverage across ALL measured sources meets 85%.
          # The previous step already scoped measurement to the
          # comprehensive list (src, apps, scripts, run.py, conftest.py).
          # No --include filter needed here —
          # the .coverage file already contains exactly what was measured.
          # This mirrors validate_code.py Step 10.
          coverage report --fail-under=85

      - name: Check diff coverage (new code >= 92%)
        run: |
          # Enforce 92% coverage on NEW code (matches validate_code.py).
          # Uses comprehensive coverage.xml so ANY changed .py file
          # in the branch is validated.
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --fail-under=92

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  jest-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Run Jest tests with coverage
        run: |
          npm test -- --coverage --coverageReporters=text \
            --coverageReporters=lcov

      - name: Upload Jest coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: frontend-unit
          name: jest-coverage
          fail_ci_if_error: false

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          E2E_TEST: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

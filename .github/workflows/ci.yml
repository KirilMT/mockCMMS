---
name: CI Pipeline

'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check import sorting with isort
        run: |
          # Check PEP 8 import organization
          isort src tests scripts run.py --check-only

      - name: Check code formatting with black
        run: |
          # Check Black code formatting
          black --check src tests scripts run.py

      - name: Check docstring formatting with docformatter
        run: |
          # Check PEP 257 docstring standards
          docformatter --check -r src tests scripts run.py

      - name: Lint with ruff
        run: |
          # Fast, modern linting (catches more than flake8)
          ruff check src tests scripts run.py

      - name: Lint with flake8
        run: |
          # Additional linting with flake8
          flake8 . --count \
            --exclude=apps,.venv,node_modules,__pycache__,.git \
            ,.pytest_cache,htmlcov,playwright-report \
            --show-source --statistics

      - name: Type check with mypy
        run: |
          # Static type analysis
          mypy

      - name: Security scan with bandit
        run: |
          # Detect security vulnerabilities
          bandit -r src/ -ll

      - name: Test with pytest and generate coverage
        run: |
          # Run ALL tests (not just backend) with stricter coverage requirement
          pytest tests/ --cov=src --cov-report=xml --cov-fail-under=82

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  jest-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Run Jest tests with coverage
        run: |
          npm test -- --coverage --coverageReporters=text \
            --coverageReporters=lcov

      - name: Upload Jest coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: frontend-unit
          name: jest-coverage
          fail_ci_if_error: false

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          E2E_TEST: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

---
name: Dependabot Auto Format

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - requirements.txt
      - requirements-dev.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-format:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Guardrail - allow manifest-only PRs from same repository
        id: guardrail
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sameRepo =
              pr.head.repo.full_name ===
              `${context.repo.owner}/${context.repo.repo}`;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              },
            );

            const allowed = new Set([
              "requirements.txt",
              "requirements-dev.txt",
            ]);
            const disallowed = files.filter((f) => !allowed.has(f.filename));

            const safe = sameRepo && disallowed.length === 0;
            core.setOutput("safe", safe ? "true" : "false");

            if (!sameRepo) {
              core.warning(
                "Skipping auto-format: PR head repository is not " +
                  "the base repository.",
              );
            }

            if (disallowed.length > 0) {
              const changed = disallowed.map((f) => f.filename).join(", ");
              core.warning(
                "Skipping auto-format: PR touches non-manifest files: " +
                  changed,
              );
            }

      - name: Checkout Dependabot branch
        if: steps.guardrail.outputs.safe == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python 3.12
        if: steps.guardrail.outputs.safe == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatter toolchain
        if: steps.guardrail.outputs.safe == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff isort black docformatter mypy autopep8 flake8 \
            pylint bandit radon yamllint

      - name: Apply backend formatting
        if: steps.guardrail.outputs.safe == 'true'
        run: python scripts/format_code.py --backend

      - name: Syntax validation gate (catch formatter regressions)
        if: steps.guardrail.outputs.safe == 'true'
        run: |
          # CRITICAL: Abort if formatting introduced syntax errors.
          # This catches formatter bugs like:
          # - docformatter 1.7.8 corrupting multiline SQL strings
          # - ruff breaking on edge cases
          # - Any other tool regression that manges code
          ruff check src apps tests scripts run.py collab.py conftest.py \
            .collab --select E999 --no-fix

      - name: Quick test validation gate (ensure logic is sound)
        if: steps.guardrail.outputs.safe == 'true'
        run: |
          # CRITICAL: Ensure formatting didn't break test logic or imports.
          # Run a quick subset of unit tests (fast, ~30s) to catch:
          # - Import errors caused by isort misconfiguration
          # - Indentation errors caused by docformatter or black
          # - Logic errors from aggressive refactoring
          python -m pytest tests/backend/unit \
            -x --tb=short -q --timeout=10 2>&1 | head -100

      - name: Commit and push formatting updates
        if: steps.guardrail.outputs.safe == 'true'
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No formatting changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(ci): auto-format after dependency update"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

---
name: Release

"on":
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

# Serialize release runs. Rapid merges to main can otherwise start overlapping
# runs that race on the release PR branch / release tagging. Queue instead of
# cancel so an in-progress tag + portable upload is never interrupted.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    # NOTE: Do NOT guard this job on the commit message (e.g. skipping when
    # it contains "auto-format (Release Please)"). Squash-merging a release
    # PR folds every squashed commit subject into the merge commit BODY, so
    # such a guard matches the release merge itself and silently skips the
    # release (no tag, no GitHub Release, no portable build). A guard is also
    # unnecessary: the "Format release artifacts" step only pushes to the
    # release PR branch (never main), and pushes made with GITHUB_TOKEN do
    # not trigger new workflow runs, so there is no recursion to prevent.
    # release-please is idempotent on every push to main.
    # Expose the release outputs so the build-portable job can decide whether a
    # release was actually cut and which tag/version to attach the artifact to.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The default GITHUB_TOKEN cannot trigger other workflows, so a release PR
      # opened with it never starts the CI Pipeline and its required checks stay
      # "Expected" forever (merge blocked). A GitHub App installation token does
      # trigger CI natively (real pull_request event, Codecov included) AND
      # keeps the PR authored by the App (a bot), so a human code owner can
      # still approve it (you cannot approve your own PR, which a personal PAT
      # would cause). The step is skipped and the workflow falls back to
      # GITHUB_TOKEN until the App is configured, so releases never break in the
      # meantime (set repo variable RELEASE_PLEASE_APP_CLIENT_ID + secret
      # RELEASE_PLEASE_APP_PRIVATE_KEY to enable it).
      - name: Generate release-please token (GitHub App)
        id: app-token
        if: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Checkout Release PR branch (if present)
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          # checkout the PR branch created by release-please so we can
          # apply formatting fixes there
          ref: >-
            refs/heads/${{
            fromJson(steps.release.outputs.pr).headBranchName
            }}
          fetch-depth: 0
          persist-credentials: true
          # Push the auto-format commit with the same App token so the PR HEAD
          # commit also triggers CI. With the default GITHUB_TOKEN this push
          # would not start a workflow run, leaving the head commit unchecked.
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Format release artifacts
        if: ${{ steps.release.outputs.pr }}
        run: |
          TARGET_BRANCH="${{
            fromJson(steps.release.outputs.pr).headBranchName
          }}"

          # Fast execution: only npm is required to run Prettier
          npm ci --silent

          # Ensure CHANGELOG.md is formatted explicitly by Prettier
          node_modules/.bin/prettier --write CHANGELOG.md || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-format (Release Please)" || true
            git push origin "HEAD:${TARGET_BRANCH}"
          else
            echo "No formatting changes to commit."
          fi

  # Build the portable Windows distribution and attach it to the GitHub
  # Release so managers and other stakeholders can download and test the app
  # without any Python/Git setup. Runs only after a release is actually cut.
  build-portable:
    name: Build & attach portable distribution
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # The portable distribution bundles the Windows Python embeddable package
    # and a .bat launcher, so it must be built on Windows.
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable distribution
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          # Enable Python UTF-8 mode so emoji progress output and any
          # subprocess text decoding work on the Windows runner's cp1252
          # console (otherwise the build crashes with UnicodeEncodeError).
          PYTHONUTF8: "1"
        run: python scripts/build_portable.py --version "${VERSION}"

      - name: Attach portable distribution to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: >-
          gh release upload "${TAG}"
          "dist/mockCMMS-portable-v${VERSION}.zip"
          --clobber

---
# yamllint disable rule:truthy
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Checkout Release PR branch (if present)
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          # checkout the PR branch created by release-please so we can
          # apply formatting fixes there
          ref: refs/heads/${{ steps.release.outputs.pr.branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Format release artifacts
        run: |
          # If the release-please action created a PR, TARGET_BRANCH will be set
          TARGET_BRANCH="${{ steps.release.outputs.pr.branch }}"
          if [ -z "$TARGET_BRANCH" ]; then
            echo "No Release PR detected; operating on main"
            TARGET_BRANCH="main"
          fi

          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          npm ci || npm install

          # Run repository-wide formatting helpers (idempotent)
          python scripts/format_code.py || true

          # Ensure CHANGELOG.md is formatted by Prettier (idempotent)
          npx prettier --write CHANGELOG.md || true

          # Commit and push only if there are changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-format (Release Please)" || true
            git push origin "HEAD:${TARGET_BRANCH}"
          else
            echo "No formatting changes to commit."
          fi

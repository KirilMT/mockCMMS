---
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Format Release PR (Python/JS standards)
        if: ${{ steps.release.outputs.pr }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          npm ci || npm install
          python scripts/format_code.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-format with format_code.py \
            (Release Please PR)" || exit 0
          git push origin \
            ${{ steps.release.outputs.pr.branch }}

      - name: Ensure CHANGELOG.md is Prettier-formatted
        if: ${{ steps.release.outputs.pr }}
        run: |
          npx prettier --write CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: ensure CHANGELOG.md is Prettier-formatted \
           (Release Please PR)" || exit 0
          git push origin ${{ steps.release.outputs.pr.branch }}

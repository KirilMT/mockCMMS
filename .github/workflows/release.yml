---
# yamllint disable rule:truthy
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Skip running this job when the triggering commit is an automated
    # formatting commit created by this workflow. This avoids recursion
    # when we push formatting fixes back to branches.
    if: "!contains(github.event.head_commit.message, 'auto-format (Release Please)')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Checkout Release PR branch (if present)
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          # checkout the PR branch created by release-please so we can
          # apply formatting fixes there
          ref: refs/heads/${{ fromJson(steps.release.outputs.pr).headBranchName }}
          fetch-depth: 0
          persist-credentials: true

      - name: Format release artifacts
        if: ${{ steps.release.outputs.pr }}
        run: |
          TARGET_BRANCH="${{ fromJson(steps.release.outputs.pr).headBranchName }}"

          # Fast execution: only npm is required to run Prettier
          npm ci --silent

          # Ensure CHANGELOG.md is formatted explicitly by Prettier
          node_modules/.bin/prettier --write CHANGELOG.md || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-format (Release Please)" || true
            git push origin "HEAD:${TARGET_BRANCH}"
          else
            echo "No formatting changes to commit."
          fi

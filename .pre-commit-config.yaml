# .pre-commit-config.yaml
repos:
  # Basic file checks (fast, non-redundant)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-symlinks

  # Local hooks using project scripts
  - repo: local
    hooks:
      - id: format-code
        name: Format Code (isort, black, docformatter, prettier)
        entry: python scripts/format_code.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: validate-code
        name: Validate Code (lint, type-check, tests)
        entry: python scripts/validate_code.py --quick
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pre-push-validation
        name: Pre-Push Full Validation
        entry: python scripts/validate_code.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

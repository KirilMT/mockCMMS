# .pre-commit-config.yaml
#
# ARCHITECTURE: Pre-commit hooks are CHECK-ONLY (verify, never modify files).
# Formatting is done EXCLUSIVELY by: python scripts/format_code.py
# This prevents stash conflicts during commit/amend workflows.
repos:
  # Check-only hooks (NEVER modify files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-symlinks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [] # Optional: add custom types here

  - repo: local
    hooks:
      - id: check-commit-msg-length
        name: Check Commit Message Length
        entry: python scripts/check_commit_msg.py
        language: python
        stages: [commit-msg]
        always_run: true

  # Local hooks using project scripts (CHECK-ONLY mode)
  - repo: local
    hooks:
      - id: validate-code
        name: Validate Code (lint, type-check, tests)
        # Only run backend/frontend on staged files. Config/Docs are handled by other hooks.
        entry: python scripts/validate_code.py --quick --backend --frontend
        language: system
        pass_filenames: true
        require_serial: true  # All files in one call — prevents repeated output
        stages: [pre-commit]

      - id: pre-push-validation
        name: Pre-Push Full Validation
        entry: python scripts/validate_code.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

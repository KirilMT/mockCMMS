# .pre-commit-config.yaml
#
# ARCHITECTURE: Pre-commit hooks are CHECK-ONLY (verify, never modify files).
# Formatting is done EXCLUSIVELY by: python scripts/format_code.py
# This prevents stash conflicts during commit/amend workflows.
repos:
  # Check-only hooks (NEVER modify files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-symlinks

  # Local hooks using project scripts (CHECK-ONLY mode)
  - repo: local
    hooks:
      - id: format-check
        name: Format Check (whitespace, EOF, imports, style, docs)
        entry: python scripts/format_code.py --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: validate-code
        name: Validate Code (lint, type-check, tests)
        entry: python scripts/validate_code.py --quick
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: auto-release
        name: Auto-Release (if commit contains [release])
        entry: python scripts/auto_release_hook.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pre-push-validation
        name: Pre-Push Full Validation
        entry: python scripts/validate_code.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Flake8 Linting
        additional_dependencies: []
        args: ["--count", "--exclude=.venv,node_modules,__pycache__,.git,.pytest_cache,htmlcov,playwright-report", "--show-source", "--statistics", "--max-line-length=88"]
        language_version: python3
        stages: [pre-commit]

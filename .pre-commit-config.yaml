# .pre-commit-config.yaml
---
#
# ARCHITECTURE: Pre-commit hooks are CHECK-ONLY (verify, never modify files).
# Formatting is done EXCLUSIVELY by: python scripts/format_code.py
# This prevents stash conflicts during commit/amend workflows.
repos:
  # Check-only hooks (NEVER modify files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-symlinks

  # Local hooks using project scripts (CHECK-ONLY mode)
  - repo: local
    hooks:
      - id: validate-code
        name: Validate Code (lint, type-check, tests)
        # Only run backend/frontend on staged files. Config/Docs are handled
        # by other hooks.
        entry: |
          python scripts/validate_code.py \
            --quick \
            --backend \
            --frontend
        language: system
        # Do not pass filenames to the validate script. The script handles
        # its own file discovery/quick modes. Allowing pre-commit to append
        # filenames caused argparse "unrecognized arguments" errors when
        # the script was invoked during commit hooks.
        pass_filenames: false
        require_serial: true
        # All files in one call — prevents repeated output
        stages: [pre-commit]

      - id: pre-push-validation
        name: Pre-Push Full Validation
        entry: python scripts/validate_code.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

{% extends "base.html" %} {% block title %}Reports{% endblock %} {% block
content %}
<div class="d-flex justify-content-between align-items-center mb-4">

  <div>
    <a href="{{ url_for('reports.generate_report') }}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Generate Report
    </a>
  </div>
</div>

</div>

<script type="application/json" id="reports-data">
  {{ reports | tojson }}
</script>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('reports.static', filename='js/pages/reports.js') }}"></script>
{% endblock %}

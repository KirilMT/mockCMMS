{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Reports</h1>
    <a href="{{ url_for('reports.generate_report') }}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Generate Report
    </a>
</div>

<div id="reportsTable" class="advanced-table-container">
    <!-- Advanced table will be rendered here -->
</div>

{% include 'components/advanced_table.html' %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    const columns = [
        { key: 'id', label: 'ID', type: 'number' },
        { key: 'title', label: 'Title', type: 'text' },
        { key: 'report_type', label: 'Type', type: 'text' },
        { key: 'format', label: 'Format', type: 'text' },
        { key: 'generated_by_name', label: 'Generated By', type: 'text' },
        { key: 'generated_on', label: 'Generated On', type: 'datetime' }
    ];

    window.advTable = new AdvancedTable('reportsTable', {
        data: {{ reports | tojson }},
        columns: columns,
        pageName: 'reports',
        pageSize: 25
    });
});
</script>
{% endblock %}

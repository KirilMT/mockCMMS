{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Log New Incident</h2>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('reports.incidents.create_incident') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="incident_type" class="form-label">Incident Type</label>
                    <select class="form-select" id="incident_type" name="incident_type" required>
                        <option value="Breakdown">Breakdown</option>
                        <option value="PLC Alarm">PLC Alarm</option>
                        <option value="Safety Issue">Safety Issue</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="equipment_line" class="form-label">Equipment / Line</label>
                    <input type="text" class="form-control" id="equipment_line" name="equipment_line" required>
                </div>

                <div class="mb-3">
                    <label for="severity" class="form-label">Severity</label>
                    <select class="form-select" id="severity" name="severity" required>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Submit Incident</button>
                <a href="{{ url_for('reports.incidents.incident_list') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

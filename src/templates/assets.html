{% extends "base.html" %}

{% block title %}Assets{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Assets</h1>
        <a href="{{ url_for('main.add_asset') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New Asset
        </a>
    </div>
    <div id="assetsTable" class="page-full-height"></div>
    {# Pass data to JS via hidden script tag #}
    <script type="application/json" id="assets-data">{{ assets | tojson }}</script>
{% endblock %}
{% block extra_js %}
    <script src="{{ url_for('static', filename='js/pages/assets.js') }}"></script>
{% endblock %}

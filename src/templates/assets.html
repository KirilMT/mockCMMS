{% extends "base.html" %}

{% block title %}Assets{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Assets</h1>
        <a href="{{ url_for('main.add_asset') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New Asset
        </a>
    </div>

    <div id="assetsTable"></div>
    {% include 'components/advanced_table.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const columns = [
                { key: 'id', label: 'ID', type: 'number' },
                { key: 'asset_code', label: 'Asset Code', type: 'text' },
                { key: 'name', label: 'Name', type: 'text' },
                { key: 'description', label: 'Description', type: 'text' },
                { key: 'asset_type', label: 'Type', type: 'text' },
                { key: 'cost_center', label: 'Cost Center', type: 'text' },
                { key: 'status', label: 'Status', type: 'text' }
            ];

            const assetsData = {{ assets | tojson }};

            advTable = new AdvancedTable('assetsTable', {
                data: assetsData,
                columns: columns,
                pageName: 'assets',
                pageSize: 25
            });
            
            // Load saved configurations
            setTimeout(() => {
                if (typeof loadSavedConfigurations === 'function') {
                    loadSavedConfigurations();
                }
            }, 100);
        });
    </script>
{% endblock %}

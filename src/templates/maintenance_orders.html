{% extends "base.html" %}

{% block title %}Maintenance Orders{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Maintenance Orders</h1>
        <a href="{{ url_for('main.add_mo') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New MO
        </a>
    </div>

    <div id="mosTable"></div>
    {% include 'components/advanced_table.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const columns = [
                { key: 'id', label: 'ID', type: 'number' },
                { key: 'asset_name', label: 'Asset', type: 'text' },
                { key: 'description', label: 'Description', type: 'text' },
                { key: 'order_type', label: 'Type', type: 'text' },
                { key: 'status', label: 'Status', type: 'text' },
                { key: 'priority', label: 'Priority', type: 'text' },
                { key: 'due_date', label: 'Due Date', type: 'date' },
                { key: 'schedule_name', label: 'Schedule', type: 'text' },
                { key: 'frequency', label: 'Frequency', type: 'text' },
                { key: 'estimated_completion_time', label: 'Est. Time (min)', type: 'number' },
                { key: 'labour_count', label: 'Labour Count', type: 'number' }
            ];

            const mosData = {{ mos | tojson }};

            advTable = new AdvancedTable('mosTable', {
                data: mosData,
                columns: columns,
                pageName: 'maintenance_orders',
                pageSize: 25
            });
            
            setTimeout(() => {
                if (typeof loadSavedConfigurations === 'function') {
                    loadSavedConfigurations();
                }
            }, 100);
        });
    </script>
{% endblock %}

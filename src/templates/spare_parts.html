{% extends "base.html" %}

{% block title %}Spare Parts{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Spare Parts</h1>
        <a href="{{ url_for('main.add_spare_part') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New Spare Part
        </a>
    </div>

    <div id="sparePartsTable" class="page-full-height"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const columns = [
                { key: 'id', label: 'ID', type: 'number' },
                { key: 'description', label: 'Description', type: 'text' },
                { key: 'manufacturer', label: 'Manufacturer', type: 'text' },
                { key: 'manufacturer_part_id', label: 'Part ID', type: 'text' },
                { key: 'stock_quantity', label: 'Stock Qty', type: 'number' },
                { key: 'location', label: 'Location', type: 'text' },
                { key: 'min_quantity', label: 'Min Qty', type: 'number' }
            ];

            const sparePartsData = {{ spare_parts | tojson }};

            // Use initAdvancedTable instead of direct instantiation
            initAdvancedTable('sparePartsTable', sparePartsData, columns, 25);
        });
    </script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Users</h1>
        <a href="{{ url_for('main.register') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New User
        </a>
    </div>

    <div id="usersTable"></div>
    {% include 'components/advanced_table.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const columns = [
                { key: 'id', label: 'ID', type: 'number' },
                { key: 'username', label: 'Username', type: 'text' },
                { key: 'email', label: 'Email', type: 'text' },
                { key: 'roles_display', label: 'Roles', type: 'text' },
                { key: 'is_active', label: 'Active', type: 'text' },
                { key: 'created_at', label: 'Created', type: 'datetime' }
            ];

            const usersData = {{ users | tojson }};

            advTable = new AdvancedTable('usersTable', {
                data: usersData,
                columns: columns,
                pageName: 'users',
                pageSize: 25
            });
            
            setTimeout(() => {
                if (typeof loadSavedConfigurations === 'function') {
                    loadSavedConfigurations();
                }
            }, 100);
        });
    </script>
{% endblock %}

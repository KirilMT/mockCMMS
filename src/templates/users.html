{% extends "base.html" %}

{% block title %}Users{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h1>Users</h1>
        <a href="{{ url_for('main.register') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New User
        </a>
    </div>
    <div id="usersTable" class="page-full-height"></div>
    {# Pass data to JS via hidden script tag #}
    <script type="application/json" id="users-data">{{ users | tojson }}</script>
{% endblock %}
{% block extra_js %}
    <script src="{{ url_for('static', filename='js/pages/users.js') }}"></script>
{% endblock %}

<!-- Advanced Table Component -->
<div id="{{ table_id }}" class="advanced-table-container">
    <!-- Table will be rendered here by JavaScript -->
</div>
<!-- Column Manager Modal -->
<div id="columnManager" class="column-manager">
    <div class="column-manager-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Manage Columns</h5>
            <button type="button" class="btn-close" onclick="closeColumnManager()"></button>
        </div>
        <div class="mb-3">
            <small class="text-muted">Drag to reorder, uncheck to hide columns</small>
        </div>
        <ul id="columnList" class="column-list">
            <!-- Column items will be populated by JavaScript -->
        </ul>
        <div class="d-flex justify-content-end gap-2">
            <button type="button"
                    class="btn btn-secondary"
                    onclick="closeColumnManager()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="applyColumnChanges()">
                Apply
            </button>
        </div>
    </div>
</div>
<!-- Filter Manager Modal -->
<div id="filterManager" class="filter-manager">
    <div class="filter-manager-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Advanced Filters</h5>
            <button type="button" class="btn-close" onclick="closeFilterManager()"></button>
        </div>
        <div id="filterRows">
            <!-- Filter rows will be populated by JavaScript -->
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="d-flex gap-2">
                <button type="button"
                        class="btn btn-outline-primary btn-sm"
                        onclick="addFilterRow()">
                    <i class="fas fa-plus"></i> Add Filter
                </button>
                <button type="button"
                        class="btn btn-outline-warning btn-sm"
                        onclick="clearAllFilters()">
                    <i class="fas fa-eraser"></i> Clear All
                </button>
            </div>
            <div class="d-flex gap-2">
                <button type="button"
                        class="btn btn-secondary"
                        onclick="closeFilterManager()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="applyFilters()">Apply</button>
            </div>
        </div>
    </div>
</div>
<!-- Configuration Save Modal -->
<div id="saveConfigModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Save Table Configuration</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="configName" class="form-label">Configuration Name</label>
                    <input type="text"
                           class="form-control"
                           id="configName"
                           placeholder="Enter a name for this view">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="setAsDefault">
                    <label class="form-check-label" for="setAsDefault">Set as default view</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button"
                        class="btn btn-primary"
                        onclick="saveTableConfiguration()">Save</button>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/advanced-table/table-modals.js') }}"></script>

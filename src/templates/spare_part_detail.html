{% extends "base.html" %}

{% block title %}{% if part %}Edit Spare Part: {{ part.name }}{% else %}Add New Spare Part{% endif %}{% endblock %}

{% block content %}
    <h1 class="mb-4">{% if part %}Edit Spare Part: {{ part.name }}{% else %}Add New Spare Part{% endif %}</h1>

    <form method="POST" action="{% if part %}{{ url_for('main.edit_spare_part', part_id=part.id) }}{% else %}{{ url_for('main.add_spare_part') }}{% endif %}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ part.name if part else '' }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" name="description">{{ part.description if part else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" class="form-control" id="quantity" name="quantity" value="{{ part.quantity if part else 0 }}" required>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" class="form-control" id="location" name="location" value="{{ part.location if part else '' }}">
        </div>
        <div class="form-group">
            <label for="min_quantity">Minimum Quantity</label>
            <input type="number" class="form-control" id="min_quantity" name="min_quantity" value="{{ part.min_quantity if part else 0 }}">
        </div>
        <button type="submit" class="btn btn-primary">{% if part %}Update Spare Part{% else %}Add Spare Part{% endif %}</button>
        <a href="{{ url_for('main.spare_parts') }}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}

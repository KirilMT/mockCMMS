# pytest configuration file
# Created: December 11, 2025
# Purpose: Configure test discovery and execution for mockCMMS test suite

[pytest]
# Test Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and Behavior
# -v: Verbose output
# --tb=short: Shorter traceback format
# --strict-markers: Require markers to be registered
# --cov=src: Enable coverage for src directory
# --cov-report=term-missing: Show missing lines in coverage report
# --cov-report=html: Generate HTML coverage report
# --cov-fail-under=70: Fail if coverage is below 70%
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Test Markers - Organized by test category directories
markers =
    unit: Unit tests - fast, isolated tests of individual components (tests/unit/)
    functional: Functional tests - API and route endpoint tests (tests/functional/)
    integration: Integration tests - end-to-end workflow tests (tests/integration/)
    security: Security tests - auth, validation, and security concerns (tests/security/)
    performance: Performance tests - scalability and optimization (tests/performance/)
    reliability: Reliability tests - error handling and robustness (tests/reliability/)
    slow: Marks tests as slow (deselect with '-m "not slow"')
    api: Marks tests for API endpoints
    routes: Marks tests for web routes
    database: Marks tests requiring database access

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage Configuration
[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */.venv/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov

